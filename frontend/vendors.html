<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vendors - VendorFlow</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="css/style.css" rel="stylesheet" />
</head>
<body>
<div class="d-flex">
  <nav id="sidebar" class="sidebar d-flex flex-column p-3">
    <div class="brand mb-4 d-flex align-items-center gap-2">
      <i class="bi bi-boxes fs-3 text-primary"></i>
      <span class="fw-bold fs-5">VendorFlow</span>
    </div>
    <ul class="nav flex-column gap-1 flex-grow-1">
      <li><a href="dashboard.html" class="nav-link"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
      <li><a href="products.html" class="nav-link"><i class="bi bi-box-seam"></i> Products</a></li>
      <li><a href="vendors.html" class="nav-link active"><i class="bi bi-building"></i> Vendors</a></li>
      <li><a href="purchase-orders.html" class="nav-link"><i class="bi bi-cart3"></i> Purchase Orders</a></li>
      <li><a href="inventory.html" class="nav-link"><i class="bi bi-clipboard-data"></i> Inventory</a></li>
    </ul>
    <div class="mt-auto">
      <div class="d-flex align-items-center gap-2 p-2 rounded user-info">
        <i class="bi bi-person-circle fs-4"></i>
        <div>
          <div class="fw-semibold small" id="sidebarUsername">User</div>
          <div class="text-muted" style="font-size:11px;" id="sidebarRole">Role</div>
        </div>
        <button class="btn btn-sm btn-outline-danger ms-auto" onclick="logout()">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>
    </div>
  </nav>
  <main class="main-content flex-grow-1">
    <header class="top-header d-flex align-items-center justify-content-between px-4 py-3">
      <div><h5 class="mb-0 fw-bold">Vendors</h5><small class="text-muted">Manage your vendor directory</small></div>
      <button class="btn btn-primary admin-only" onclick="openAddVendorModal()">
        <i class="bi bi-plus-lg me-1"></i> Add Vendor
      </button>
    </header>
    <div class="p-4">
      <div class="card border-0 shadow-sm mb-4">
        <div class="card-body d-flex flex-wrap gap-3 align-items-center">
          <div class="input-group" style="max-width:300px;">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input type="text" id="searchInput" class="form-control" placeholder="Search vendors..." />
          </div>
          <span class="ms-auto text-muted small" id="vendorCount"></span>
        </div>
      </div>
      <div class="row g-4" id="vendorGrid">
        <div class="col-12 text-center text-muted py-5">Loading vendors...</div>
      </div>
    </div>
  </main>
</div>

<div class="modal fade" id="vendorModal" tabindex="-1">
  <div class="modal-dialog modal-lg"><div class="modal-content">
    <div class="modal-header border-0">
      <h5 class="modal-title fw-bold" id="vendorModalTitle">Add Vendor</h5>
      <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
    </div>
    <div class="modal-body">
      <form id="vendorForm">
        <input type="hidden" id="vendorId" />
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Vendor Name *</label>
            <input type="text" id="vName" class="form-control" required />
          </div>
          <div class="col-md-6">
            <label class="form-label">Contact Person</label>
            <input type="text" id="vContact" class="form-control" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Email</label>
            <input type="email" id="vEmail" class="form-control" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Phone</label>
            <input type="text" id="vPhone" class="form-control" />
          </div>
          <div class="col-12">
            <label class="form-label">Address</label>
            <input type="text" id="vAddress" class="form-control" />
          </div>
          <div class="col-md-6">
            <label class="form-label">City</label>
            <input type="text" id="vCity" class="form-control" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Country</label>
            <input type="text" id="vCountry" class="form-control" />
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer border-0">
      <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
      <button type="button" class="btn btn-primary" onclick="saveVendor()">Save Vendor</button>
    </div>
  </div></div>
</div>

<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog modal-sm"><div class="modal-content">
    <div class="modal-body text-center p-4">
      <i class="bi bi-trash3 text-danger fs-1 mb-3 d-block"></i>
      <h6 class="fw-bold">Delete Vendor?</h6>
      <p class="text-muted small">This action cannot be undone.</p>
      <input type="hidden" id="deleteVendorId" />
    </div>
    <div class="modal-footer border-0 justify-content-center">
      <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
      <button type="button" class="btn btn-danger" onclick="confirmDeleteVendor()">Delete</button>
    </div>
  </div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/vendors.js"></script>
</body>
</html>
