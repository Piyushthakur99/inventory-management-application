<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VendorFlow – Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="css/style.css" rel="stylesheet" />
</head>
<body class="login-bg d-flex align-items-center justify-content-center min-vh-100">

  <div class="login-card card shadow-lg p-4" style="width:420px; border-radius:16px;">
    <div class="text-center mb-4">
      <div class="brand-icon mb-3">
        <i class="bi bi-boxes fs-1 text-primary"></i>
      </div>
      <h2 class="fw-bold">VendorFlow</h2>
      <p class="text-muted small">Inventory &amp; Vendor Management</p>
    </div>

    <div id="alertBox" class="alert d-none" role="alert"></div>

    <form id="loginForm">
      <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" id="username" class="form-control" placeholder="Enter username" required />
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" id="password" class="form-control" placeholder="Enter password" required />
          <button class="btn btn-outline-secondary" type="button" id="togglePassword">
            <i class="bi bi-eye"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold" id="loginBtn">
        <span id="loginSpinner" class="spinner-border spinner-border-sm me-2 d-none"></span>
        Sign In
      </button>
    </form>

    <hr class="my-4" />
    <div class="text-center text-muted small">
      <p>Demo credentials:</p>
      <p><strong>Admin:</strong> admin / admin123</p>
      <p><strong>Staff:</strong> staff / staff123</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Toggle password visibility
    document.getElementById('togglePassword').addEventListener('click', function () {
      const pwd = document.getElementById('password');
      const icon = this.querySelector('i');
      if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.classList.replace('bi-eye', 'bi-eye-slash');
      } else {
        pwd.type = 'password';
        icon.classList.replace('bi-eye-slash', 'bi-eye');
      }
    });

    document.getElementById('loginForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const spinner = document.getElementById('loginSpinner');
      const alert = document.getElementById('alertBox');

      btn.disabled = true;
      spinner.classList.remove('d-none');
      alert.classList.add('d-none');

      try {
        await login(
          document.getElementById('username').value,
          document.getElementById('password').value
        );
      } catch (err) {
        alert.textContent = err.message || 'Login failed. Please check your credentials.';
        alert.className = 'alert alert-danger';
        alert.classList.remove('d-none');
      } finally {
        btn.disabled = false;
        spinner.classList.add('d-none');
      }
    });
  </script>
</body>
</html>
