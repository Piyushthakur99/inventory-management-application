<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Purchase Orders - VendorFlow</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="css/style.css" rel="stylesheet" />
</head>
<body>
<div class="d-flex">
  <nav id="sidebar" class="sidebar d-flex flex-column p-3">
    <div class="brand mb-4 d-flex align-items-center gap-2">
      <i class="bi bi-boxes fs-3 text-primary"></i>
      <span class="fw-bold fs-5">VendorFlow</span>
    </div>
    <ul class="nav flex-column gap-1 flex-grow-1"><li><a href="dashboard.html" class="nav-link "><i class="bi bi-speedometer2"></i> Dashboard</a></li>
      <li><a href="products.html" class="nav-link "><i class="bi bi-box-seam"></i> Products</a></li>
      <li><a href="vendors.html" class="nav-link "><i class="bi bi-building"></i> Vendors</a></li>
      <li><a href="purchase-orders.html" class="nav-link active"><i class="bi bi-cart3"></i> Purchase Orders</a></li>
      <li><a href="inventory.html" class="nav-link "><i class="bi bi-clipboard-data"></i> Inventory</a></li></ul>
    <div class="mt-auto">
      <div class="d-flex align-items-center gap-2 p-2 rounded user-info">
        <i class="bi bi-person-circle fs-4"></i>
        <div>
          <div class="fw-semibold small" id="sidebarUsername">User</div>
          <div class="text-muted" style="font-size:11px;" id="sidebarRole">Role</div>
        </div>
        <button class="btn btn-sm btn-outline-danger ms-auto" onclick="logout()">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>
    </div>
  </nav>
  <main class="main-content flex-grow-1">
    <header class="top-header d-flex align-items-center justify-content-between px-4 py-3">
      <div><h5 class="mb-0 fw-bold">Purchase Orders</h5><small class="text-muted">Manage purchase orders</small></div>
      <button class="btn btn-primary admin-only" onclick="openCreateOrderModal()"><i class="bi bi-plus-lg me-1"></i> Create Order</button>
    </header>
    <div class="p-4">
      <div class="card border-0 shadow-sm mb-4">
        <div class="card-body d-flex flex-wrap gap-3 align-items-center">
          <div class="btn-group">
            <button class="btn btn-outline-secondary btn-sm active" id="filterAll" onclick="filterOrders('ALL')">All</button>
            <button class="btn btn-outline-warning btn-sm" id="filterPENDING" onclick="filterOrders('PENDING')">Pending</button>
            <button class="btn btn-outline-info btn-sm" id="filterAPPROVED" onclick="filterOrders('APPROVED')">Approved</button>
            <button class="btn btn-outline-success btn-sm" id="filterRECEIVED" onclick="filterOrders('RECEIVED')">Received</button>
            <button class="btn btn-outline-danger btn-sm" id="filterCANCELLED" onclick="filterOrders('CANCELLED')">Cancelled</button>
          </div>
          <span class="ms-auto text-muted small" id="orderCount"></span>
        </div>
      </div>
      <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr><th class="ps-4">Order #</th><th>Vendor</th><th>Items</th><th>Total</th><th>Status</th><th>Date</th><th class="text-end pe-4">Actions</th></tr>
              </thead>
              <tbody id="orderTableBody"><tr><td colspan="7" class="text-center text-muted py-5">Loading...</td></tr></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
<div class="modal fade" id="orderModal" tabindex="-1">
  <div class="modal-dialog modal-xl"><div class="modal-content">
    <div class="modal-header border-0">
      <h5 class="modal-title fw-bold">Create Purchase Order</h5>
      <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
    </div>
    <div class="modal-body">
      <div class="row g-3 mb-4">
        <div class="col-md-6">
          <label class="form-label">Vendor *</label>
          <select id="orderVendor" class="form-select"><option value="">-- Select Vendor --</option></select>
        </div>
        <div class="col-md-6">
          <label class="form-label">Expected Delivery Date</label>
          <input type="date" id="orderDelivery" class="form-control" />
        </div>
        <div class="col-12">
          <label class="form-label">Notes</label>
          <textarea id="orderNotes" class="form-control" rows="2"></textarea>
        </div>
      </div>
      <h6 class="fw-bold mb-3">Order Items</h6>
      <div id="orderItemsContainer"></div>
      <button type="button" class="btn btn-outline-primary btn-sm mt-2" onclick="addOrderItem()">
        <i class="bi bi-plus"></i> Add Item
      </button>
      <div class="mt-3 text-end">
        <strong>Total: Rs. <span id="orderTotal">0.00</span></strong>
      </div>
    </div>
    <div class="modal-footer border-0">
      <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
      <button type="button" class="btn btn-primary" onclick="submitOrder()">Create Order</button>
    </div>
  </div></div>
</div>
<div class="modal fade" id="orderDetailModal" tabindex="-1">
  <div class="modal-dialog modal-lg"><div class="modal-content">
    <div class="modal-header border-0">
      <h5 class="modal-title fw-bold" id="orderDetailTitle">Order Details</h5>
      <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
    </div>
    <div class="modal-body" id="orderDetailBody">Loading...</div>
    <div class="modal-footer border-0" id="orderDetailActions"></div>
  </div></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/purchase-orders.js"></script>
</body>
</html>
