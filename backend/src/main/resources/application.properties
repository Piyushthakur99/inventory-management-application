# Application
spring.application.name=inventory-management
server.port=8080

# Java 21 - Virtual Threads (Project Loom)
spring.threads.virtual.enabled=true

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/inventory_db
spring.data.mongodb.database=inventory_db

# JWT
jwt.secret=ThisIsAVeryLongSecretKeyForJWTTokenGenerationInInventoryManagementSystem2024
jwt.expiration=86400000

# Logging
logging.level.org.springframework.security=WARN
logging.level.com.inventory=DEBUG

# Disable Spring Security default password
spring.security.user.password=disabled
